<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Featured Playlist - Music Playlist Explorer</title>
    <link rel="icon" type="image/x-icon" href="/images/favicon.ico">

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header -->
    <header>
        <h1>Music Playlist Explorer</h1>
        <!-- Navigation -->
        <div class="nav-buttons">
            <a href="featured.html" class="nav-button active">Featured Page</a>
            <a href="allPlaylists.html" class="nav-button">All Playlists</a>
        </div>
    </header>

    <!-- Main -->
    <main>
        <!-- Featured playlist -->
        <section class="featured-section">
            <div class="featured-container">
                <div class="featured-left">
                    <div class="featured-image"></div>
                    <h2 class="featured-title">Playlist Title</h2>
                    <div class="featured-likes">
                        <span class="heart">♥</span>
                        <span class="like-count">0</span>
                    </div>
                </div>
                <div class="featured-right">
                    <div class="featured-header">
                        <h3>Songs</h3>
                        <button class="get-description-button" id="featured-get-description-button">Get Description</button>
                    </div>

                    <!-- AI Description -->
                    <div class="ai-description-section" id="featured-ai-description-section" style="display: none;">
                        <p class="ai-description-output" id="featured-ai-description-output"></p>
                    </div>

                    <div class="featured-song-list"></div>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 Music Playlist Explorer</p>
    </footer>
    <script src="secrets.js"></script>
    <script src="playlistAI.js"></script>
    <script src="featured.js"></script>
</body>
</html>
